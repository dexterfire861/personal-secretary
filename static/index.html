<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Secretary</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 18px 28px;
      border-bottom: 1px solid #1e1e1e;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.03em;
      color: #fff;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .message {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      animation: appear 0.18s ease;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .assistant {
      align-self: flex-start;
      background: #161616;
      border: 1px solid #242424;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .assistant.streaming::after {
      content: '▊';
      display: inline;
      animation: blink 0.75s step-end infinite;
      color: #6366f1;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    #input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: #111;
      border: 1px solid #272727;
      border-radius: 14px;
      padding: 12px 16px;
      color: #e8e8e8;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 160px;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    #input::placeholder { color: #444; }
    #input:focus { border-color: #6366f1; }

    #send {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      padding: 11px 20px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    #send:hover:not(:disabled) { opacity: 0.85; }
    #send:disabled { opacity: 0.35; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>Personal Secretary</header>

  <div id="chat"></div>

  <div id="input-area">
    <textarea id="input" placeholder="Ask me anything…" rows="1"></textarea>
    <button id="send">Send</button>
  </div>

  <script>
    const chat  = document.getElementById('chat');
    const input = document.getElementById('input');
    const send  = document.getElementById('send');

    function addMessage(role, text = '') {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      send.disabled = true;

      addMessage('user', text);

      const bubble = addMessage('assistant');
      bubble.classList.add('streaming');

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });

        if (!response.ok) {
          bubble.textContent = `Error: ${response.status}`;
          return;
        }

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          bubble.textContent += decoder.decode(value, { stream: true });
          chat.scrollTop = chat.scrollHeight;
        }
      } catch (err) {
        bubble.textContent = `Error: ${err.message}`;
      } finally {
        bubble.classList.remove('streaming');
        send.disabled = false;
        input.focus();
      }
    }

    send.addEventListener('click', sendMessage);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = input.scrollHeight + 'px';
    });
  </script>
</body>
</html>
